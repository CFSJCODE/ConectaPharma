name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-hosting-live
  cancel-in-progress: true

jobs:
  build_and_deploy:
    name: Deploy Firebase Hosting and Firestore rules
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      FIREBASE_PROJECT_ID: conectapharma-33fd7
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CONECTAPHARMA_33FD7 }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Validate Firebase project files
        run: |
          test -f firebase.json
          test -f Frontend/index.html
          test -f Firebase/firestore.rules

      - name: Deploy Hosting and Firestore rules
        run: firebase deploy --project "$FIREBASE_PROJECT_ID" --only hosting,firestore:rules
