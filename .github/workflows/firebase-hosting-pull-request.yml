name: Deploy to Firebase Hosting on PR

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-hosting-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_and_preview:
    name: Deploy Firebase Hosting preview channel
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      FIREBASE_PROJECT_ID: conectapharma-33fd7
      CHANNEL_ID: pr-${{ github.event.pull_request.number || github.run_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CONECTAPHARMA_33FD7 }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Validate Firebase project files
        run: |
          test -f firebase.json
          test -f Frontend/index.html

      - name: Deploy Hosting preview channel
        run: firebase hosting:channel:deploy "$CHANNEL_ID" --project "$FIREBASE_PROJECT_ID" --expires 7d
