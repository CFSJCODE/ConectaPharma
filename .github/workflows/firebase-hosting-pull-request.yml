name: Deploy to Firebase Hosting on PR

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: firebase-hosting-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_and_preview:
    name: Deploy Firebase Hosting preview channel
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      FIREBASE_PROJECT_ID: conectapharma-33fd7
      CHANNEL_ID: pr-${{ github.event.pull_request.number || github.run_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Validate Firebase project files
        run: |
          test -f firebase.json
          test -f Frontend/index.html

      - name: Deploy Firebase Hosting preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CONECTAPHARMA_33FD7 }}
          projectId: ${{ env.FIREBASE_PROJECT_ID }}
          channelId: ${{ env.CHANNEL_ID }}
          expires: 7d
